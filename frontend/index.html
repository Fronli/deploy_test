<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Marketplace</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Config for Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        secondary: '#4338ca',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-gray-800 antialiased selection:bg-primary selection:text-white flex flex-col items-center py-12 px-4 sm:px-6 lg:px-8">
    
    <div class="w-full max-w-2xl bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-100">
        <!-- Header -->
        <div class="bg-gradient-to-r from-primary to-indigo-600 px-8 py-10 text-center">
            <h1 class="text-4xl font-extrabold text-white tracking-tight mb-2">Event Marketplace</h1>
            <p class="text-indigo-100 text-lg font-medium opacity-90">Discover upcoming events near you</p>
        </div>

        <!-- Content -->
        <div class="p-8">
            <div class="flex justify-between items-center mb-8 border-b border-gray-100 pb-6">
                <h2 class="text-2xl font-bold text-gray-900">Upcoming Events</h2>
                <button id="load-events-btn" class="bg-primary hover:bg-secondary text-white font-semibold py-2.5 px-6 rounded-lg shadow-sm hover:shadow transition-all duration-200 transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary flex items-center space-x-2">
                    <svg class="w-5 h-5 hidden" id="loading-spinner" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Load Events</span>
                </button>
            </div>

            <!-- Status Message area -->
            <div id="status-message" class="hidden mb-6 p-4 rounded-lg font-medium text-sm transition-all duration-300"></div>

            <!-- List container -->
            <div id="events-container" class="space-y-4 min-h-[160px] flex flex-col justify-center">
                <!-- Empty state shown initially -->
                <div class="text-gray-400 italic text-center py-8 px-4 border-2 border-dashed border-gray-200 rounded-xl" id="empty-state">
                    <p class="mb-2">No events loaded yet.</p>
                    <p class="text-sm">Click "Load Events" to fetch the latest schedule.</p>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="bg-gray-50 border-t border-gray-100 px-8 py-4 text-center text-sm text-gray-500">
            Powered by Vanilla JS & Express API
        </div>
    </div>

    <!-- Main JS logic -->
    <script src="./js/main.js"></script>
</body>
</html>
